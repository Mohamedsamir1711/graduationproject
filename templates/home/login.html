{% extends "style.html" %}

{% block login %}
{%csrf_token%}
<div id="login">
  <h2 class="text-center text-info pt-5 pb-5">Log In</h2>
  <div class="container">
      <div id="login-row" class="row justify-content-center align-items-center">
          <div id="login-column" class="col-md-6">
              <div id="login-box" class="col-md-12">
                  <form id="login-form" class="form" action="{% url 'login'%}" method="POST">
                      {%csrf_token%}
                      {% if messages %}
                      {%for message in messages %}
                      <div class="alert alert-danger" role="alert">
                        {{ message }}
                      </div>
                      {% endfor %}
                      {% endif %}
                      <div class="form-group">
                          <label for="username" class="text-info">Username:</label><br>
                          <input type="text" name="username" id="username" class="form-control" placeholder="username">
                      </div>
                      <div class="form-group">
                          <label for="password" class="text-info">Password:</label><br>
                          <input type="text" name="password" id="password" class="form-control" placeholder="password">
                      </div>
                      <div class="form-group">
                          <label for="remember-me" class="text-info"><span>Remember me</span> <span><input id="remember-me" name="remember-me" type="checkbox"></span></label><br>
                          <input type="submit" name="submit" class="btn btn-primary btn-md" value="submit">
                      </div>
                      <div id="register-link" class="text-right">
                          <a href="{%url 'signup'%}" class="text-info">Register here</a>
                      </div>
                  </form>
              </div>
          </div>
      </div>
  </div>
</div>
{% endblock login %}
